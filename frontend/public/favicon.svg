<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <!-- Leaf Gradient -->
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a3e635" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <!-- Shadow filter for modern look -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#064e3b" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Rounded Base Card -->
  <rect width="450" height="450" x="31" y="31" rx="110" fill="url(#bgGrad)" filter="url(#dropShadow)" />
  
  <!-- Sprout Stem & Leaves -->
  <g transform="translate(4, 0)">
    <!-- Main Stem -->
    <path d="M256 370 Q256 260 210 160" fill="none" stroke="#ffffff" stroke-width="20" stroke-linecap="round" />
    
    <!-- Left Leaf -->
    <path d="M242 270 C160 270 120 200 200 150 C240 180 244 230 242 270 Z" fill="url(#leafGrad)" />
    
    <!-- Right Leaf (Main) -->
    <path d="M248 210 C330 190 360 110 280 90 C230 120 238 170 248 210 Z" fill="#ffffff" />
    
    <!-- Vein Details -->
    <path d="M242 210 Q190 190 170 180" fill="none" stroke="#047857" stroke-width="6" stroke-linecap="round" />
    <path d="M272 160 Q305 140 320 125" fill="none" stroke="#047857" stroke-width="6" stroke-linecap="round" />
  </g>
</svg>